<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$pread</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-search-page">
  <div class="container search-home">
    <header class="search-topbar">
      <a class="mini-brand" href="index.html" aria-label="$pread home">
        <span class="logo-dollar mini">$</span>
        <span class="logo-word mini" data-i18n="brandWord">pread</span>
      </a>

      <div class="lang-switcher">
        <button type="button" class="lang-btn" data-lang-btn="zh">中文</button>
        <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
      </div>
    </header>

    <main class="search-hero-shell">
      <div class="search-badge" data-i18n="landingTag">为跨境电商卖家打造</div>

      <div class="search-logo-lockup">
        <span class="logo-dollar">$</span>
        <span class="logo-word" data-i18n="brandWord">pread</span>
        <div class="search-logo-wave" aria-hidden="true"></div>
      </div>

      <h1 class="search-headline" data-i18n="landingTitle">
        让商品文案生成与市场判断<br />更轻松、更直观、更贴近目标国家
      </h1>

      <p class="search-subline" data-i18n="landingDesc">
        $pread 帮跨境卖家更快完成商品文案生成、市场适配分析与进入建议判断，用更轻松的方式做更清楚的决策。
      </p>

      <div class="search-command-box expanded">
        <div class="search-command-input">
          <span class="search-command-dot"></span>
          <span class="search-command-text" data-i18n="searchPrompt">你可以用它做什么</span>
        </div>

        <div class="search-suggestion-grid">
          <div class="suggestion-card">
            <span class="suggestion-index">01</span>
            <p data-i18n="searchExample1">为美国市场生成一版更像独立站的商品文案</p>
          </div>

          <div class="suggestion-card">
            <span class="suggestion-index">02</span>
            <p data-i18n="searchExample2">先判断这个产品适不适合澳大利亚，再决定要不要卖</p>
          </div>

          <div class="suggestion-card">
            <span class="suggestion-index">03</span>
            <p data-i18n="searchExample3">用市场分析结果继续生成更贴近目标国家的卖点</p>
          </div>
        </div>

        <p class="search-hint" data-i18n="searchHint">
          像搜索一样开始，但走完的是一整条跨境卖家的工作流。
        </p>

        <div class="search-command-actions">
          <a class="search-action primary" href="generate.html" data-i18n="navGenerate">商品文案生成</a>
          <a class="search-action" href="analyze.html" data-i18n="navAnalyze">市场适配分析</a>
        </div>
      </div>

      <div class="search-quick-notes">
        <span class="quick-note" data-i18n="benefit1Title">更快验证产品</span>
        <span class="quick-note" data-i18n="benefit2Title">减少盲目判断</span>
        <span class="quick-note" data-i18n="benefit3Title">更贴近目标市场</span>
      </div>
    </main>
  </div>

  <script src="i18n.js"></script>
</body>
</html>
