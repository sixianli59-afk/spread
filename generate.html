<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$pread - 商品文案生成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero playful-hero">
      <div class="landing-nav">
        <div class="brand-logo center" data-i18n="brand">$pread</div>

        <div class="lang-switcher">
          <button type="button" class="lang-btn" data-lang-btn="zh">中文</button>
          <button type="button" class="lang-btn" data-lang-btn="en">EN</button>
        </div>
      </div>

      <p class="subtitle" data-i18n="generateSubtitle">30秒生成适合英语市场的商品文案</p>
      <p class="desc" data-i18n="generateDesc">
        输入商品名、3个卖点和目标国家，自动生成英文标题、卖点和短描述
      </p>

      <div class="page-nav">
        <a class="nav-link" href="index.html" data-i18n="navHome">首页</a>
        <a class="nav-link active" href="generate.html" data-i18n="navGenerate">商品文案生成</a>
        <a class="nav-link" href="analyze.html" data-i18n="navAnalyze">市场适配分析</a>
      </div>
    </header>

    <section id="marketContextCard" class="history-section hidden">
      <div class="history-header">
        <h2>来自市场分析的参考</h2>
      </div>
      <div class="result-box">
        <p><strong>产品名：</strong><span id="contextProductName">-</span></p>
        <p><strong>目标国家：</strong><span id="contextCountry">-</span></p>
        <p><strong>进入建议：</strong><span id="contextAdvice">-</span></p>
        <p><strong>推荐文案方向：</strong><span id="contextCopyDirection">-</span></p>
      </div>
    </section>

    <main class="card">
      <section class="form-section">
        <label data-i18n="labelProductName">商品名</label>
        <input id="productName" type="text" data-i18n-placeholder="placeholderProduct" placeholder="例如：Portable Blender" />

        <label data-i18n="labelFeature1">卖点1</label>
        <input id="feature1" type="text" data-i18n-placeholder="placeholderFeature1" placeholder="例如：轻便易携带" />

        <label data-i18n="labelFeature2">卖点2</label>
        <input id="feature2" type="text" data-i18n-placeholder="placeholderFeature2" placeholder="例如：USB充电" />

        <label data-i18n="labelFeature3">卖点3</label>
        <input id="feature3" type="text" data-i18n-placeholder="placeholderFeature3" placeholder="例如：适合旅行和办公室" />

        <label data-i18n="labelCountry">目标国家</label>
        <select id="country">
          <option data-i18n-value="countryUS">美国</option>
          <option data-i18n-value="countryUK">英国</option>
          <option data-i18n-value="countryCA">加拿大</option>
          <option data-i18n-value="countryAU">澳大利亚</option>
        </select>

        <button id="generateBtn" data-i18n="btnGenerate">立即生成</button>

        <p id="loadingText" class="status hidden" data-i18n="loadingGenerate">正在生成中...</p>
        <p id="errorText" class="status error hidden" data-i18n="errorGeneric">生成失败，请重新尝试</p>
      </section>

      <section class="result-section">
        <h2 data-i18n="resultTitle">生成结果</h2>

        <div class="result-box">
          <h3 data-i18n="resultHeadingTitle">英文标题：</h3>
          <p id="titleResult">...</p>
          <button class="copy-btn" data-copy="titleResult" data-i18n="copyTitle">复制标题</button>
        </div>

        <div class="result-box">
          <h3 data-i18n="resultHeadingBullets">英文卖点：</h3>
          <ul id="bulletsResult">
            <li>...</li>
            <li>...</li>
            <li>...</li>
          </ul>
          <button class="copy-btn" data-copy="bulletsResult" data-i18n="copyBullets">复制卖点</button>
        </div>

        <div class="result-box">
          <h3 data-i18n="resultHeadingDesc">英文短描述：</h3>
          <p id="descResult">...</p>
          <button class="copy-btn" data-copy="descResult" data-i18n="copyDesc">复制描述</button>
        </div>

        <button id="copyAllBtn" class="copy-all-btn" data-i18n="copyAll">复制全部</button>
      </section>
    </main>

    <section class="history-section">
      <div class="history-header">
        <h2 data-i18n="historyTitle">最近生成记录</h2>
        <button id="clearHistoryBtn" class="clear-history-btn" data-i18n="clearHistory">清空历史记录</button>
      </div>

      <div id="historyList" class="history-list">
        <p class="empty-history" data-i18n="emptyHistory">还没有历史记录</p>
      </div>
    </section>
  </div>

  <div id="toast" class="toast hidden">已复制</div>

  <script src="i18n.js"></script>
  <script src="script.js"></script>
</body>
</html>
